name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # PUBLIC REPO HARDENING: only review PRs opened by the owner. Fork PRs from
    # third parties do not receive secrets anyway, so they could not authenticate;
    # this also avoids burning quota on every drive-by PR.
    if: github.actor == 'gghez'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Public-repo hardening: restrict the PR comment context to the owner,
          # so third-party comments cannot inject instructions. A non-empty
          # include list is a strict allowlist (everything else is dropped).
          include_comments_by_actor: "gghez"
          # Pin Opus 4.8 at high reasoning effort for reviews.
          # See https://code.claude.com/docs/en/cli-reference for available options.
          claude_args: |
            --model claude-opus-4-8
            --effort high

