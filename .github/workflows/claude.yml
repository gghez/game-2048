name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # PUBLIC REPO HARDENING: only the repo owner may trigger Claude. Without this
    # gate, anyone could drive the agent (and reach our secrets) by commenting
    # "@claude" or, if they ever gained triage rights, by applying the label.
    # github.actor is the user who caused the event (commenter / labeler / opener).
    # Trigger paths: "@claude" in a comment/review/issue, OR the "claude" label
    # added to an issue (label => implement the issue end-to-end).
    if: |
      github.actor == 'gghez' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude') ||
        (github.event_name == 'issues' && github.event.action != 'labeled' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    # Implementation mode: write access lets Claude create a branch, push commits
    # and open a PR. The action creates branches under the "claude/" prefix.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Adding the "claude" label to an issue triggers an implementation run.
          label_trigger: "claude"

          # Public-repo hardening: the issue/PR comment thread is fed to Claude as
          # context. Restrict that context to the owner's comments so third-party
          # comments cannot inject instructions. A non-empty include list is a
          # strict allowlist (everything else, bots included, is dropped). (NOTE:
          # the issue title/body are always included regardless of author — only
          # label issues whose body you trust.)
          include_comments_by_actor: "gghez"

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Opus 4.8 at high effort. --allowed-tools is ADDITIVE (base GitHub +
          # file tools always stay on); Bash is off by default, so we opt into a
          # scoped set. git is READ-ONLY and `gh pr` is limited to create/view/diff
          # (NO merge, NO close) — combined with read-only git this blocks both
          # self-merge paths (`gh pr merge`, direct `git push ...:main`) while
          # letting Claude open (but never merge) a PR. ./gradlew for build/test.
          # --append-system-prompt makes Claude open the PR itself after pushing,
          # only when it actually implemented an issue on a fresh branch.
          claude_args: |
            --model claude-opus-4-8
            --effort high
            --allowed-tools "Bash(./gradlew *),Bash(git status *),Bash(git diff *),Bash(git log *),Bash(gh pr create *),Bash(gh pr view *),Bash(gh pr diff *),Bash(gh issue view *)"
            --append-system-prompt "When your task was to implement a GitHub issue and you created a new branch with code changes, after committing and pushing open a pull request against the base branch using 'gh pr create' (derive the title/body from the issue and reference it). Never merge or close the PR — leave it for the owner to review and merge. If you are only answering a question or already operating inside an existing pull request, do not create a new PR."
